name: "YouTube OAuth - Step 1: Generate URL"

on:
  workflow_dispatch: {}

jobs:
  generate-url:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install google-auth-oauthlib

      - name: Generate OAuth consent URL
        env:
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
        run: |
          python3 - << 'PYEOF'
          import os
          from google_auth_oauthlib.flow import InstalledAppFlow

          cfg = {"installed": {
              "client_id": os.environ["YOUTUBE_CLIENT_ID"],
              "client_secret": os.environ["YOUTUBE_CLIENT_SECRET"],
              "auth_uri": "https://accounts.google.com/o/oauth2/auth",
              "token_uri": "https://oauth2.googleapis.com/token",
              "redirect_uris": ["http://localhost"],
          }}
          scopes = [
              "https://www.googleapis.com/auth/youtube.upload",
              "https://www.googleapis.com/auth/youtube.readonly",
              "https://www.googleapis.com/auth/youtube.force-ssl",
          ]
          flow = InstalledAppFlow.from_client_config(cfg, scopes)
          flow.redirect_uri = "http://localhost"
          url, _ = flow.authorization_url(access_type="offline", prompt="consent")

          print("\n" + "=" * 70)
          print("OPEN THIS URL on your phone (sign in with the brand YouTube account):")
          print("=" * 70)
          print(url)
          print("=" * 70)
          print("After you approve, your browser will be redirected to")
          print("http://localhost/?code=XXXX - the page won't load but COPY THE FULL URL")
          print("from the address bar, then trigger the Step 2 workflow with that URL.")

          summary = os.environ.get("GITHUB_STEP_SUMMARY", "")
          if summary:
              with open(summary, "a") as f:
                  f.write("## Step 1 complete\n\n")
                  f.write("Open this URL on your phone (brand YouTube account):\n\n")
                  f.write(f"```\n{url}\n```\n\n")
                  f.write("After approving, your browser redirects to `http://localhost/?code=...`\n")
                  f.write("The page won't load — **copy the full URL from the address bar**,\n")
                  f.write("then trigger the **Step 2** workflow and paste it as the input.\n")
          PYEOF
