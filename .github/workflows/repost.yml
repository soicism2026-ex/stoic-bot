name: repost

on:
  workflow_dispatch:
    inputs:
      video_id:
        description: "YouTube video ID to unlist before re-posting"
        required: true
        default: ""

permissions:
  contents: write
  issues: write

jobs:
  repost:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Install ffmpeg + fonts
        run: sudo apt-get update && sudo apt-get install -y ffmpeg fonts-dejavu

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Unlist video and remove from posts.csv
        if: ${{ inputs.video_id != '' }}
        env:
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: python scripts/remove_post.py --video-id "${{ inputs.video_id }}"

      - name: Run self-healing post pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          # ELEVENLABS_VOICE_ID intentionally NOT set — see daily-short.yml:
          # leaving it unset enables the Stoic voice-pool rotation in tts.py.
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PROMO_ENABLED: "1"
          PROMO_PRODUCT_NAME: "The Stoic Reset"
          PROMO_PITCH: "FREE this month only — The Stoic Reset, my 30-day Stoic journal"
          PROMO_URL: "https://soicism.gumroad.com/l/cslosv"
          PROMO_COMMENT: "1"
        run: python scripts/daily_post.py

      - name: Fetch analytics
        env:
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: python src/analytics.py

      - name: Commit log
        run: |
          git config user.name "stoic-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/posts.csv data/analytics.csv QA_LOG.md backups/
          git diff --staged --quiet || git commit -m "log: $(date -u +%F) repost"
          git push
