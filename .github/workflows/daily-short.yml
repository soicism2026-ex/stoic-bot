name: daily-short

on:
  schedule:
    # 16:00 UTC = 12:00 ET. Midday/early-afternoon posting tends to do well.
    - cron: "0 16 * * *"
  workflow_dispatch: {}

permissions:
  contents: write
  issues: write

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ffmpeg + fonts
        run: sudo apt-get update && sudo apt-get install -y ffmpeg fonts-dejavu

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Validate secrets
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
        run: python scripts/check_secrets.py

      - name: Run self-healing post pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          ELEVENLABS_VOICE_ID: ${{ secrets.ELEVENLABS_VOICE_ID }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          # Product promo — edit these to update copy without touching code.
          # Set PROMO_ENABLED to "0" to disable all promo behaviour.
          PROMO_ENABLED: "1"
          PROMO_PRODUCT_NAME: "The Stoic Reset"
          PROMO_PITCH: "FREE this month only — The Stoic Reset, my 30-day Stoic journal"
          PROMO_URL: "https://soicism.gumroad.com/l/cslosv"
          PROMO_COMMENT: "1"
          # PROMO_CTA_VARIATIONS: pipe-delimited (|) list of 3-5 CTA strings.
          # Leave unset to use the three built-in defaults from src/promo.py.
        run: python scripts/daily_post.py

      - name: Fetch analytics
        env:
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: python src/analytics.py

      - name: Prune low-performing videos
        env:
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: python scripts/prune_videos.py

      - name: Commit log and backups
        run: |
          git config user.name "stoic-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/posts.csv data/analytics.csv QA_LOG.md backups/
          git diff --staged --quiet || git commit -m "log: $(date -u +%F) post"
          git push
