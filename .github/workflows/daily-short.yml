name: daily-short

on:
  schedule:
    # 4 posts per day, spaced to hit peak hours in all major time zones:
    # 07:00 UTC — Europe morning (9am CET, 3am ET)
    # 12:00 UTC — US East morning (8am ET), Europe afternoon
    # 17:00 UTC — US afternoon (1pm ET, 10am PT), Europe evening
    # 22:00 UTC — US West evening (5pm PT), Asia/Pacific morning
    - cron: "0 7 * * *"
    - cron: "0 12 * * *"
    - cron: "0 17 * * *"
    - cron: "0 22 * * *"
  workflow_dispatch: {}

permissions:
  contents: write
  issues: write

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ffmpeg + fonts
        run: sudo apt-get update && sudo apt-get install -y ffmpeg fonts-dejavu fonts-liberation

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Validate secrets
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
        run: python scripts/check_secrets.py

      - name: Run self-healing post pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          # ELEVENLABS_VOICE_ID intentionally NOT set: leaving it unset lets
          # src/tts.py rotate the deep/authoritative Stoic voice pool
          # (George/Daniel/Brian) and weight it by analytics. Setting it would
          # hard-pin a single voice and disable rotation.
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          # Instagram cross-post (optional — pipeline skips if unset).
          # IG_ACCESS_TOKEN: long-lived token for an IG Professional account.
          # IG_USER_ID: the Instagram Business account id (numeric).
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          # Product promo — edit these to update copy without touching code.
          # Set PROMO_ENABLED to "0" to disable all promo behaviour.
          PROMO_ENABLED: "1"
          PROMO_PRODUCT_NAME: "The Stoic Reset"
          PROMO_PITCH: "FREE this month only — The Stoic Reset, my 30-day Stoic journal"
          PROMO_URL: "https://soicism.gumroad.com/l/cslosv"
          PROMO_COMMENT: "1"
          # PROMO_CTA_VARIATIONS: pipe-delimited (|) list of 3-5 CTA strings.
          # Leave unset to use the three built-in defaults from src/promo.py.
        run: python scripts/daily_post.py

      - name: Fetch analytics
        env:
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: python src/analytics.py

      - name: Prune low-performing videos
        env:
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: python scripts/prune_videos.py

      - name: Commit log and backups
        run: |
          git config user.name "stoic-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/posts.csv data/analytics.csv QA_LOG.md backups/
          git diff --staged --quiet || git commit -m "log: $(date -u +%F) post"
          git push
