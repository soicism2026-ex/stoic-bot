name: Auto-improve stoic-bot

on:
  # PAUSED: the daily auto-run is disabled. This loop commits to main unreviewed
  # and twice broke live posting (most recently by lowering MAX_POSTS_PER_DAY to
  # 1, silently capping the channel at one upload/day). It can still be launched
  # deliberately from the Actions tab (workflow_dispatch). To re-enable the daily
  # schedule, uncomment the two lines below — but add guardrails first so it
  # cannot touch posting cadence, the post cap, or the publish/render core.
  # schedule:
  #   - cron: "0 6 * * *"   # daily at 06:00 UTC, before the first post run
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  improve:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so improve_loop can read all of posts.csv

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Validate secrets
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: python scripts/check_secrets.py

      - name: Pull latest analytics
        env:
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: python src/analytics.py

      # Run the improvement loop brain. It reads posts.csv + analytics.csv,
      # evaluates last run's outcome, picks the next focus area, and writes:
      #   data/improve_prompt.txt  — the specific task for Claude Code this run
      #   data/improve_state.json  — memory across runs (what was tried, verdicts)
      - name: Generate improvement focus
        id: loop
        run: |
          python scripts/improve_loop.py
          echo "focus=$(python -c "import json; print(json.load(open('data/improve_state.json'))['current_focus'])")" >> "$GITHUB_OUTPUT"

      - name: Show this run's focus
        run: |
          echo "=== Focus: ${{ steps.loop.outputs.focus }} ==="
          echo "=== Prompt preview (first 30 lines) ==="
          head -30 data/improve_prompt.txt

      # Claude Code reads data/improve_prompt.txt, implements the change,
      # appends to IMPROVEMENTS.md, and commits directly to main.
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Read data/improve_prompt.txt — that file contains your complete
            instructions for this improvement run, generated by the improvement
            loop based on real analytics data.

            Follow those instructions exactly. When you are done:
            - Run the smoke test included in the instructions (if any)
            - Append what you changed and why to IMPROVEMENTS.md with today's date
            - Commit all changes directly to main with a clear commit message
              that names the focus area (e.g. "improve: hook copywriting — tighten
              second-person accusation rule based on analytics")

            Do not open a PR. Commit directly to main.
          claude_args: "--max-turns 50"

      # Commit the loop's state files so memory persists across runs.
      # The code changes themselves are committed by Claude Code above.
      - name: Commit loop state
        run: |
          git config user.name "stoic-bot"
          git config user.email "bot@users.noreply.github.com"
          git pull --rebase origin main
          git add data/improve_state.json data/analytics.csv
          git diff --staged --quiet || git commit -m "chore: update improve_state and analytics [skip ci]"
          git push
