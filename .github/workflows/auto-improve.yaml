name: Auto-improve stoic-bot

on:
  schedule:
    - cron: "0 6 * * *"   # daily at 06:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  improve:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Validate secrets
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: python scripts/check_secrets.py

      - name: Fetch analytics
        env:
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: python scripts/fetch_analytics.py > analytics.json

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Read analytics.json, QA_LOG.md, and IMPROVEMENTS.md.

            DAILY SCOPE: fix any defects logged in QA_LOG.md (rendering bugs,
            caption clipping, sync drift) — implement fixes directly in the
            relevant source files (src/render.py, src/tts.py, etc.).

            WEEKLY SCOPE (only if today is Monday): based on at least 7 videos
            of analytics data in analytics.json, propose and implement ONE
            strategy improvement to retention or CTR. Never repeat or revert a
            change already listed in IMPROVEMENTS.md.

            Verify the pipeline still works: set REEL_CAPTIONS=0, synthesize a
            short stub audio with `ffmpeg -f lavfi -i sine=duration=10 /tmp/stub.mp3`,
            then run `python -c "import sys; sys.path.insert(0,'src'); from render import render_reel; from pathlib import Path; render_reel('Test quote', 'Test Author', Path('/tmp/stub.mp3'), Path('/tmp/test_out.mp4'), theme='discipline', word_timings=[], hook='Test hook')"`.
            Success means the file exists and is > 0 bytes.

            Append what you changed and why (with today's date) to
            IMPROVEMENTS.md.

            Open a PR with the changes.
          claude_args: "--max-turns 40"
