name: pull-analytics

on:
  schedule:
    # 14:00 UTC daily = 10:00 America/Toronto. Pulls the trailing week's numbers.
    - cron: "0 14 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  analytics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Fetch analytics
        env:
          METRICOOL_USER_TOKEN: ${{ secrets.METRICOOL_USER_TOKEN }}
          METRICOOL_USER_ID: ${{ secrets.METRICOOL_USER_ID }}
          METRICOOL_BLOG_ID: ${{ secrets.METRICOOL_BLOG_ID }}
        run: python src/analytics.py
      - name: Commit analytics
        run: |
          git config user.name "stoic-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/analytics.csv
          git diff --staged --quiet || git commit -m "analytics: $(date -u +%F)"
          git push
