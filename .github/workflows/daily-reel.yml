name: daily-reel

on:
  schedule:
    # 11:00 UTC = 07:00 America/Toronto (EDT). Adjust for your target audience.
    - cron: "0 11 * * *"
  workflow_dispatch: {}   # lets you trigger manually from the Actions tab

permissions:
  contents: write   # so the run can commit posts.csv back

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ffmpeg + fonts
        run: sudo apt-get update && sudo apt-get install -y ffmpeg fonts-dejavu

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run bot
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          ELEVENLABS_VOICE_ID: ${{ secrets.ELEVENLABS_VOICE_ID }}
          METRICOOL_USER_TOKEN: ${{ secrets.METRICOOL_USER_TOKEN }}
          METRICOOL_USER_ID: ${{ secrets.METRICOOL_USER_ID }}
          METRICOOL_BLOG_ID: ${{ secrets.METRICOOL_BLOG_ID }}
        run: python src/main.py

      - name: Commit log
        run: |
          git config user.name "stoic-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/posts.csv
          git diff --staged --quiet || git commit -m "log: $(date -u +%F) post"
          git push
